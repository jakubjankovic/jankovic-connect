name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'App.tsx'
      - 'index.js'
      - 'package.json'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Ensure debug keystore (release is signed with it for sideloading)
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee ../gradle-build.log

      - name: Inventory of produced APKs
        if: always()
        run: |
          echo "=== APK files under android/ ===" > apk-list.txt
          find android -type f -name "*.apk" -printf "%p  (%s bytes)\n" 2>/dev/null >> apk-list.txt || true
          echo "" >> apk-list.txt
          echo "=== contents of release output dir ===" >> apk-list.txt
          ls -la android/app/build/outputs/apk/release/ >> apk-list.txt 2>&1 || echo "(release dir missing)" >> apk-list.txt
          cat apk-list.txt

      - name: Publish APK + diagnostics to Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Jankovič Connect — APK
          body: |
            Najnovšia verzia aplikácie Jankovič Connect (.apk).
            Stiahni `app-release.apk` do telefónu a nainštaluj (povoľ inštaláciu z neznámych zdrojov).
          files: |
            android/**/*.apk
            apk-list.txt
            gradle-build.log
