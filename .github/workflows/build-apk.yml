name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'App.tsx'
      - 'index.js'
      - 'package.json'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jankovic-connect-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Publish APK to Release (easy phone download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Jankovič Connect — APK
          body: |
            Najnovšia verzia aplikácie Jankovič Connect (.apk).
            Stiahni `app-release.apk` do telefónu a nainštaluj (povoľ inštaláciu z neznámych zdrojov).
          files: android/app/build/outputs/apk/release/app-release.apk
